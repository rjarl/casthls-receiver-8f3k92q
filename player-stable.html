<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CastHLS Player</title>
    <style>
      :root {
        --bg: #020305;
        --text: #f8fafc;
        --muted: #cbd5e1;
        --dim: rgba(203, 213, 225, 0.72);
        --panel: rgba(2, 3, 5, 0.72);
        --line: rgba(255, 255, 255, 0.18);
        --accent: #38bdf8;
        --danger: #f97373;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #000;
        color: var(--text);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        cursor: none;
      }

      video {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        background: #000;
        object-fit: contain;
      }

      .chrome {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: grid;
        grid-template-rows: auto 1fr auto;
        padding: 7vh 6vw 6vh;
        opacity: 1;
        pointer-events: none;
        transition: opacity 260ms ease;
        background:
          linear-gradient(to bottom, rgba(0, 0, 0, 0.68), transparent 32%),
          linear-gradient(to top, rgba(0, 0, 0, 0.78), transparent 42%);
      }

      .chrome.hidden {
        opacity: 0;
      }

      .top {
        min-width: 0;
      }

      .title {
        max-width: 76vw;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 34px;
        line-height: 1.15;
        font-weight: 720;
        letter-spacing: 0;
      }

      .state {
        margin-top: 8px;
        color: var(--dim);
        font-size: 20px;
      }

      .center {
        display: grid;
        place-items: center;
      }

      .center-button {
        width: 112px;
        height: 112px;
        display: grid;
        place-items: center;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--panel);
        box-shadow: 0 18px 46px rgba(0, 0, 0, 0.36);
      }

      .icon {
        display: block;
        position: relative;
      }

      .icon.play {
        width: 0;
        height: 0;
        margin-left: 9px;
        border-top: 28px solid transparent;
        border-bottom: 28px solid transparent;
        border-left: 42px solid var(--text);
      }

      .icon.pause {
        width: 42px;
        height: 54px;
      }

      .icon.pause::before,
      .icon.pause::after {
        content: "";
        position: absolute;
        top: 0;
        width: 14px;
        height: 54px;
        border-radius: 3px;
        background: var(--text);
      }

      .icon.pause::before {
        left: 0;
      }

      .icon.pause::after {
        right: 0;
      }

      .bottom {
        display: grid;
        gap: 14px;
      }

      .transport {
        display: flex;
        align-items: center;
        gap: 18px;
        color: var(--muted);
        font-size: 20px;
        font-variant-numeric: tabular-nums;
      }

      .mini-icon {
        width: 36px;
        height: 36px;
        display: grid;
        place-items: center;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.12);
      }

      .mini-icon .icon.play {
        border-top-width: 9px;
        border-bottom-width: 9px;
        border-left-width: 14px;
        margin-left: 3px;
      }

      .mini-icon .icon.pause {
        width: 14px;
        height: 18px;
      }

      .mini-icon .icon.pause::before,
      .mini-icon .icon.pause::after {
        width: 5px;
        height: 18px;
        border-radius: 1px;
      }

      .time {
        min-width: 70px;
      }

      .duration {
        min-width: 70px;
        text-align: right;
      }

      .bar {
        position: relative;
        height: 12px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.18);
      }

      .fill {
        width: 0%;
        height: 100%;
        border-radius: inherit;
        background: var(--accent);
        transition: width 180ms linear;
      }

      .toast {
        position: fixed;
        left: 50%;
        bottom: 23vh;
        z-index: 20;
        min-width: 180px;
        padding: 12px 18px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--panel);
        color: var(--text);
        font-size: 22px;
        text-align: center;
        opacity: 0;
        transform: translateX(-50%) translateY(10px);
        transition: opacity 180ms ease, transform 180ms ease;
      }

      .toast.visible {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }

      .error {
        position: fixed;
        inset: 0;
        z-index: 30;
        display: none;
        place-items: center;
        padding: 8vw;
        background: var(--bg);
        color: var(--danger);
        font-size: 30px;
        line-height: 1.35;
        text-align: center;
      }

      .closed {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--text);
        font-size: 32px;
        text-align: center;
      }

      @media (max-width: 900px) {
        .title {
          font-size: 28px;
        }

        .center-button {
          width: 92px;
          height: 92px;
        }
      }
    </style>
  </head>
  <body>
    <video id="video" autoplay playsinline></video>
    <div id="error" class="error"></div>
    <div id="chrome" class="chrome">
      <div class="top">
        <div id="title" class="title">CastHLS</div>
        <div id="state" class="state">Press OK to play</div>
      </div>
      <div class="center">
        <div id="centerButton" class="center-button">
          <span id="centerIcon" class="icon play"></span>
        </div>
      </div>
      <div class="bottom">
        <div class="transport">
          <span class="mini-icon"><span id="smallIcon" class="icon play"></span></span>
          <span id="currentTime" class="time">--:--</span>
          <div class="bar"><div id="progress" class="fill"></div></div>
          <span id="duration" class="duration">--:--</span>
        </div>
      </div>
    </div>
    <div id="toast" class="toast"></div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const defaultSrc = "https://nogeovod-fy.atresmedia.com/vsg/_definst_/assets13/2026/04/27/3331038B-400B-4B92-997D-AEE14FC11138/hls.smil/playlist.m3u8";
      const src = params.get("src") || defaultSrc;
      const title = params.get("title") || "CastHLS";
      const video = document.getElementById("video");
      const errorEl = document.getElementById("error");
      const chromeEl = document.getElementById("chrome");
      const titleEl = document.getElementById("title");
      const stateEl = document.getElementById("state");
      const centerIconEl = document.getElementById("centerIcon");
      const smallIconEl = document.getElementById("smallIcon");
      const progressEl = document.getElementById("progress");
      const currentTimeEl = document.getElementById("currentTime");
      const durationEl = document.getElementById("duration");
      const toastEl = document.getElementById("toast");
      let player = null;
      let initialized = false;
      let shakaLoadPromise = null;
      let lastBackAt = 0;
      let controlsTimer = null;
      let toastTimer = null;

      titleEl.textContent = title;
      setStage("Press OK to play");
      showControls(true);
      try {
        window.history.replaceState({ casthls: "root" }, "", window.location.href);
        window.history.pushState({ casthls: "remote-back" }, "", window.location.href);
      } catch (error) {
        console.warn("Could not prepare back handling", error);
      }

      window.addEventListener("error", (event) => {
        showError(`JavaScript error: ${event.message || "unknown"}`);
      });

      window.addEventListener("unhandledrejection", (event) => {
        showError(`Playback promise failed: ${event.reason && event.reason.message ? event.reason.message : "unknown"}`);
      });

      function formatTime(seconds) {
        if (!Number.isFinite(seconds) || seconds < 0) return "--:--";
        const rounded = Math.floor(seconds);
        const h = Math.floor(rounded / 3600);
        const m = Math.floor((rounded % 3600) / 60);
        const s = rounded % 60;
        if (h > 0) return `${h}:${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
        return `${m}:${String(s).padStart(2, "0")}`;
      }

      function showControls(persist) {
        chromeEl.classList.remove("hidden");
        clearTimeout(controlsTimer);
        if (!persist && initialized && !video.paused && !video.ended) {
          controlsTimer = setTimeout(() => chromeEl.classList.add("hidden"), 3600);
        }
      }

      function showToast(message) {
        toastEl.textContent = message;
        toastEl.classList.add("visible");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toastEl.classList.remove("visible"), 1200);
      }

      function setIcon(paused) {
        const icon = paused ? "play" : "pause";
        centerIconEl.className = `icon ${icon}`;
        smallIconEl.className = `icon ${icon}`;
      }

      function setStage(stage) {
        stateEl.textContent = stage;
        showControls(stage !== "Playing");
      }

      function showError(message) {
        errorEl.style.display = "grid";
        errorEl.textContent = message;
        setStage("Error");
        showControls(true);
      }

      function updateProgress() {
        const current = video.currentTime;
        const duration = video.duration;
        currentTimeEl.textContent = formatTime(current);
        durationEl.textContent = Number.isFinite(duration) && duration > 0 ? formatTime(duration) : "Live";
        if (Number.isFinite(duration) && duration > 0) {
          progressEl.style.width = `${Math.max(0, Math.min(100, (current / duration) * 100))}%`;
        } else {
          progressEl.style.width = "100%";
        }
      }

      function seekBy(deltaSeconds) {
        if (!Number.isFinite(video.duration) || video.duration <= 0) {
          showToast("Seek unavailable");
          return false;
        }
        video.currentTime = Math.max(0, Math.min(video.duration - 1, video.currentTime + deltaSeconds));
        updateProgress();
        showToast(deltaSeconds > 0 ? `+${deltaSeconds}s` : `${deltaSeconds}s`);
        showControls(false);
        return true;
      }

      async function togglePlayback() {
        showControls(false);
        if (!initialized) {
          await init();
          return "load stream";
        }
        if (video.paused) {
          video.muted = false;
          await video.play();
          return "play";
        }
        video.pause();
        return "pause";
      }

      function isBackKey(event) {
        return event.key === "BrowserBack" ||
          event.key === "Backspace" ||
          event.key === "Escape" ||
          event.key === "GoBack" ||
          event.key === "Back" ||
          event.key === "XF86Back" ||
          event.keyCode === 4 ||
          event.keyCode === 8 ||
          event.keyCode === 27 ||
          event.keyCode === 166 ||
          event.code === "BrowserBack";
      }

      function handleBack() {
        const now = Date.now();
        showControls(true);
        if (now - lastBackAt < 2500) {
          try {
            video.pause();
            if (player) player.unload();
          } catch (error) {
            console.warn("Could not unload before exit", error);
          }
          document.body.innerHTML = "<main class='closed'>CastHLS closed</main>";
          return "exit";
        }
        lastBackAt = now;
        setStage("Press Back again to exit");
        showToast("Back again to exit");
        return "back armed";
      }

      function handleBackNavigation() {
        const action = handleBack();
        if (action !== "exit") {
          try {
            window.history.pushState({ casthls: "remote-back" }, "", window.location.href);
          } catch (error) {
            console.warn("Could not restore back trap", error);
          }
        }
      }

      function loadShakaScript() {
        if (window.shaka) return Promise.resolve();
        if (shakaLoadPromise) return shakaLoadPromise;
        setStage("Loading player");
        shakaLoadPromise = new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = "https://cdn.jsdelivr.net/npm/shaka-player/dist/shaka-player.compiled.min.js";
          script.onload = resolve;
          script.onerror = () => reject(new Error("Could not load Shaka script."));
          document.head.appendChild(script);
        });
        return shakaLoadPromise;
      }

      async function init() {
        if (initialized) return;
        initialized = true;
        if (!src) {
          showError("Missing src parameter.");
          return;
        }
        await loadShakaScript();
        setStage("Preparing stream");
        shaka.polyfill.installAll();
        if (!window.shaka || !shaka.Player.isBrowserSupported()) {
          showError("Shaka Player is not supported here.");
          return;
        }

        player = new shaka.Player(video);
        player.addEventListener("error", (event) => {
          console.error("Shaka error", event.detail);
          const code = event.detail && event.detail.code ? ` (${event.detail.code})` : "";
          showError(`Playback error${code}. The stream may need a different receiver.`);
        });

        try {
          setStage("Loading stream");
          await player.load(src);
          setStage("Ready");
          try {
            await video.play();
            setStage("Playing");
          } catch (playError) {
            console.warn("Autoplay failed", playError);
            setStage("Press OK to play");
          }
        } catch (error) {
          console.error("Load failed", error);
          const code = error && error.code ? ` (${error.code})` : "";
          showError(`Could not load stream${code}.`);
        }
      }

      video.addEventListener("playing", () => {
        setIcon(false);
        setStage("Playing");
        showControls(false);
      });
      video.addEventListener("play", () => setIcon(false));
      video.addEventListener("pause", () => {
        setIcon(true);
        setStage("Paused");
        showControls(true);
      });
      video.addEventListener("waiting", () => {
        setStage("Buffering");
        showControls(true);
      });
      video.addEventListener("timeupdate", updateProgress);
      video.addEventListener("durationchange", updateProgress);

      document.addEventListener("keydown", async (event) => {
        let action = "ignored";
        event.preventDefault();
        showControls(false);
        if (isBackKey(event)) {
          handleBack();
          return;
        }
        if (event.key === "ArrowLeft") action = seekBy(-30) ? "seek -30s" : "seek unavailable";
        if (event.key === "ArrowRight") action = seekBy(30) ? "seek +30s" : "seek unavailable";
        if (event.key === "ArrowDown") action = seekBy(-60) ? "seek -60s" : "seek unavailable";
        if (event.key === "ArrowUp") action = seekBy(60) ? "seek +60s" : "seek unavailable";
        if (event.key === " " || event.key === "Enter" || event.key === "MediaPlayPause") {
          action = await togglePlayback();
        }
        if (action === "ignored") showToast(event.key || "Remote");
      });

      window.addEventListener("popstate", (event) => {
        event.preventDefault();
        handleBackNavigation();
      });

      setInterval(updateProgress, 500);
    </script>
  </body>
</html>
